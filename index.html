<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>자원운영팀 근태 조회</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --primary:#1d4ed8; --primary-soft:#dbeafe; --shadow:0 14px 34px rgba(15,23,42,.08); --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    body{min-height:100vh}
    .app{max-width:760px;margin:0 auto;padding:16px 14px 44px}
    .hero{padding:22px 18px;border-radius:26px;background:linear-gradient(140deg,#1d4ed8 0%,#2563eb 60%,#60a5fa 100%);color:#fff;box-shadow:var(--shadow)}
    .hero h1{margin:0 0 8px;font-size:24px;line-height:1.18;font-weight:800;letter-spacing:-.03em}
    .hero p{margin:0;font-size:14px;line-height:1.6;opacity:.94}
    .panel{margin-top:14px;background:var(--card);border:1px solid rgba(255,255,255,.6);box-shadow:var(--shadow);border-radius:var(--radius)}
    .login{padding:18px}
    .label{display:block;margin-bottom:8px;font-size:13px;font-weight:800;color:var(--muted)}
    .input-row{display:flex;gap:10px;align-items:center}
    .input{flex:1;min-width:0;padding:15px 16px;border:1.5px solid var(--line);border-radius:15px;background:#fff;color:var(--text);font-size:18px;font-weight:800;letter-spacing:.02em;outline:none}
    .input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    .btn{border:0;border-radius:15px;padding:15px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .btn-primary{background:var(--primary);color:#fff;min-width:92px}
    .btn-soft{background:#eef2ff;color:#1e3a8a}
    .help{margin-top:10px;font-size:12.5px;color:var(--muted);line-height:1.58}
    .error{display:none;margin-top:10px;padding:12px 13px;border-radius:14px;background:#fef2f2;color:#b91c1c;font-size:13px;font-weight:700}
    .content{padding:16px}
    .topbar{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .title h2{margin:0;font-size:22px;line-height:1.24;font-weight:900;letter-spacing:-.03em}
    .subtitle{margin-top:6px;font-size:13px;line-height:1.55;color:var(--muted)}
    .badge{display:inline-flex;align-items:center;white-space:nowrap;padding:8px 11px;border-radius:999px;background:var(--primary-soft);color:#1e40af;font-size:12px;font-weight:800}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .chip{padding:9px 11px;border-radius:999px;background:#f8fafc;border:1px solid var(--line);font-size:12px;font-weight:700;color:#334155}
    .section-title{margin:18px 0 10px;font-size:16px;font-weight:900;letter-spacing:-.02em}
    .metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .metric{min-height:92px;padding:13px 12px;border-radius:16px;border:1px solid var(--line);background:#fff}
    .metric .k{font-size:12px;line-height:1.4;color:var(--muted);font-weight:800}
    .metric .v{margin-top:8px;font-size:24px;line-height:1.05;font-weight:900;letter-spacing:-.03em}
    .metric .u{margin-top:5px;font-size:11px;color:#64748b}
    .table-wrap{margin-top:8px;border:1px solid var(--line);border-radius:16px;overflow:auto;background:#fff;-webkit-overflow-scrolling:touch}
    table{border-collapse:separate;border-spacing:0;width:100%;min-width:1120px}
    thead th{position:sticky;top:0;z-index:3;padding:8px 6px;background:#eff6ff;color:#1e3a8a;border-bottom:1px solid #bfdbfe;font-size:12px;font-weight:900;line-height:1.35;text-align:center;white-space:nowrap}
    tbody td{padding:6px 6px;border-bottom:1px solid #eef2f7;font-size:13px;line-height:1.45;text-align:center;white-space:nowrap}
    tbody tr:nth-child(even){background:#fcfdff}
    th.sticky,td.sticky{position:sticky;left:0}
    thead th.sticky{z-index:4;background:#dbeafe}
    tbody td.sticky{z-index:1;background:#fff;text-align:left;font-weight:800;min-width:85x;max-width:85px;white-space:normal}
    tbody tr:nth-child(even) td.sticky{background:#fcfdff}
    .note{margin-top:12px;font-size:12px;line-height:1.6;color:var(--muted)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .hidden{display:none!important}
    .empty{padding:24px 14px;text-align:center;color:var(--muted);font-size:14px}
    @media (min-width:560px){
      .app{padding:22px 18px 48px}
      .hero h1{font-size:29px}
      .metrics{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
  </style>
</head>
<body
  <main class="app">
    <section class="hero">
      <h1>자원운영팀 근태 조회</h1>
      <p>사번을 입력하면 본인 데이터만 볼 수 있습니다. 자원운영팀 자체 근태현황이므로 <strong>큰태 시스템</strong>
      과는 다를 수 있습니다
      </section>

    <section class="panel login" id="loginCard">
      <label class="label" for="empNoInput">사번 입력</label>
      <div class="input-row">
        <input class="input" id="empNoInput" type="text" inputmode="numeric" autocomplete="off" placeholder="예: 2110115" maxlength="20">
        <button class="btn btn-primary" id="loginBtn">조회</button>
      </div>
      <div class="help">같은 기기에서는 마지막 조회 사번을 임시 저장합니다.</div>
      <div class="error" id="errorBox"></div>
    </section>

    <section class="panel content hidden" id="contentCard">
      <div class="topbar">
        <div class="title">
          <h2 id="empName">-</h2>
          <div class="subtitle" id="empMeta">-</div>
        </div>
        <div class="badge" id="monthBadge">-</div>
      </div>

      <div class="chips" id="infoChips"></div>

      <h3 class="section-title">월간 요약</h3>
      <div class="metrics" id="metricGrid"></div>

      <h3 class="section-title">일자별 근태 상세</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sticky">날짜</th>
              <th>근무일수</th>
              <th>정상근무</th>
              <th>평일연장</th>
              <th>휴일근무</th>
              <th>휴일연장</th>
              <th>야간근로</th>
              <th>교육시간</th>
              <th>지각조퇴</th>
              <th>연차</th>
              <th>하휴</th>
              <th>13휴</th>
              <th>그외</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>

      <div class="note">표는 모바일에서 가로 스크롤로 볼 수 있게 구성했습니다. 휴가 항목은 건수 기준입니다.</div>
      <div class="actions">
        <button class="btn btn-soft" id="logoutBtn">사번 다시 입력</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'attendance_mobile_emp_no_v2';
    let attendanceData = null;

    const $ = {
      loginCard: document.getElementById('loginCard'),
      contentCard: document.getElementById('contentCard'),
      empNoInput: document.getElementById('empNoInput'),
      loginBtn: document.getElementById('loginBtn'),
      errorBox: document.getElementById('errorBox'),
      empName: document.getElementById('empName'),
      empMeta: document.getElementById('empMeta'),
      monthBadge: document.getElementById('monthBadge'),
      infoChips: document.getElementById('infoChips'),
      metricGrid: document.getElementById('metricGrid'),
      detailBody: document.getElementById('detailBody'),
      logoutBtn: document.getElementById('logoutBtn')
    };

    function fmt(value){
      const n = Number(value || 0);
      return (Math.round(n * 100) / 100).toString().replace(/\.0+$/, '');
    }
    function showError(message){
      $.errorBox.textContent = message;
      $.errorBox.style.display = 'block';
    }
    function clearError(){
      $.errorBox.textContent = '';
      $.errorBox.style.display = 'none';
    }
    function metric(label, value, unit){
      return `<div class="metric"><div class="k">${label}</div><div class="v">${fmt(value)}</div><div class="u">${unit}</div></div>`;
    }
    function render(emp){
      $.empName.textContent = emp.name;
      $.empMeta.textContent = `${emp.team || '소속 미기재'} · 사번 ${emp.empNo}`;
      $.monthBadge.textContent = `${attendanceData.month} 근태`;
      $.infoChips.innerHTML = [
        `<div class="chip">No. ${emp.no ?? '-'}</div>`,
        `<div class="chip">근무형태 ${emp.workType || '-'}</div>`,
        `<div class="chip">조회 사번 ${emp.empNo}</div>`
      ].join('');

      $.metricGrid.innerHTML = [
        metric('근무일수', emp.totals.workDay, '일'),
        metric('정상근무', emp.totals.normalWork, '시간'),
        metric('평일연장', emp.totals.weekdayOvertime, '시간'),
        metric('휴일근무', emp.totals.holidayWork, '시간'),
        metric('휴일연장', emp.totals.holidayOvertime, '시간'),
        metric('야간근로', emp.totals.nightWork, '시간'),
        metric('교육시간', emp.totals.educationTime, '시간'),
        metric('지각조퇴', emp.totals.lateEarly, '시간'),
        metric('연차', emp.totals.annualLeave, '건'),
        metric('하휴', emp.totals.summerLeave, '건'),
        metric('13휴', emp.totals.leave13, '건'),
        metric('그외', emp.totals.otherLeave, '건')
      ].join('');

      $.detailBody.innerHTML = emp.daily.map(row => `
        <tr>
          <td class="sticky">${row.dateLabel}</td>
          <td>${fmt(row.workDay)}</td>
          <td>${fmt(row.normalWork)}</td>
          <td>${fmt(row.weekdayOvertime)}</td>
          <td>${fmt(row.holidayWork)}</td>
          <td>${fmt(row.holidayOvertime)}</td>
          <td>${fmt(row.nightWork)}</td>
          <td>${fmt(row.educationTime)}</td>
          <td>${fmt(row.lateEarly)}</td>
          <td>${fmt(row.annualLeave)}</td>
          <td>${fmt(row.summerLeave)}</td>
          <td>${fmt(row.leave13)}</td>
          <td>${fmt(row.otherLeave)}</td>
        </tr>
      `).join('') || `<tr><td class="empty" colspan="13">표시할 데이터가 없습니다.</td></tr>`;

      $.loginCard.classList.add('hidden');
      $.contentCard.classList.remove('hidden');
    }
    function findEmployee(empNo){
      const key = String(empNo || '').trim();
      return attendanceData?.employees?.find(item => String(item.empNo) === key) || null;
    }
    async function loadJson(){
      const res = await fetch('./data/current.json', {cache:'no-store'});
      if(!res.ok) throw new Error('JSON 로딩 실패');
      attendanceData = await res.json();
    }
    async function login(){
      clearError();
      const empNo = $.empNoInput.value.trim();
      if(!empNo){
        showError('사번을 입력해 주세요.');
        $.empNoInput.focus();
        return;
      }
      if(!attendanceData){
        try{
          await loadJson();
        }catch(err){
          showError('data/current.json을 불러오지 못했습니다. 다시 실행해 주세요.');
          return;
        }
      }
      const emp = findEmployee(empNo);
      if(!emp){
        showError('일치하는 사번이 없습니다. 사번을 다시 확인해 주세요.');
        return;
      }
      localStorage.setItem(STORAGE_KEY, empNo);
      render(emp);
    }
    function logout(){
      $.contentCard.classList.add('hidden');
      $.loginCard.classList.remove('hidden');
      $.empNoInput.focus();
      clearError();
    }
    $.loginBtn.addEventListener('click', login);
    $.empNoInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') login(); });
    $.logoutBtn.addEventListener('click', logout);
    (async function init(){
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved) $.empNoInput.value = saved;
      try{ await loadJson(); }catch(e){}
    })();
  </script>
</body>
</html>
